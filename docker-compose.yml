services:
  mysql:
    image: mysql:8.4
    container_name: fitness-mysql
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: fitness
      MYSQL_DATABASE: fitness
    volumes:
      - fitness_mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-pfitness']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  fitness_mysql_data:
