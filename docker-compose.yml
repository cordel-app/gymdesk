services:
  mysql:
    image: mysql:8.4
    container_name: gymdesk-mysql
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: gymdesk
      MYSQL_DATABASE: gymdesk
    volumes:
      - gymdesk_mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-pgymdesk']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  gymdesk_mysql_data:
