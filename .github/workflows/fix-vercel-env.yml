name: Fix Vercel BACKEND_URL

on:
  workflow_dispatch:
    inputs:
      backend_url:
        description: 'Value for BACKEND_URL'
        required: true
        default: 'http://backend-dev.gymdesk.uk:3000'

jobs:
  fix-env:
    name: Update BACKEND_URL
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - project: backoffice
            project_id_secret: VERCEL_PROJECT_ID
          - project: app
            project_id_secret: VERCEL_PROJECT_ID_APP
    steps:
      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Show current BACKEND_URL (${{ matrix.project }})
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets[matrix.project_id_secret] }}
        run: |
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          echo "--- current value ---"
          grep '^BACKEND_URL' .vercel/.env.production.local || echo "BACKEND_URL not set"

      - name: Set BACKEND_URL (${{ matrix.project }})
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets[matrix.project_id_secret] }}
        run: |
          vercel env rm BACKEND_URL production --yes --token=${{ secrets.VERCEL_TOKEN }} || true
          printf '%s' "${{ inputs.backend_url }}" | vercel env add BACKEND_URL production --token=${{ secrets.VERCEL_TOKEN }}
          echo "BACKEND_URL updated for ${{ matrix.project }}"
