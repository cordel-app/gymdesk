name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/fitness-api

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: api/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          no-cache: true

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CORBACK_SSH_HOST }}
          username: podman
          key: ${{ secrets.CORBACK_SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            echo "${{ secrets.GHCR_PAT }}" | podman login ghcr.io -u ${{ github.repository_owner }} --password-stdin

            # Check disk space before pulling (fail if less than 1GB free)
            AVAILABLE=$(df / --output=avail | tail -1)
            if [ "$AVAILABLE" -lt 1048576 ]; then
              echo "ERROR: Less than 1GB free on disk (${AVAILABLE}KB available). Aborting deploy."
              exit 1
            fi

            # Keep rootless containers running after this SSH session ends
            loginctl enable-linger podman || true

            podman image prune -af
            podman pull ghcr.io/${{ env.IMAGE_NAME }}:latest

            # Run DB migrations from the VPS (HeatWave is VCN-private; the CI
            # runner cannot reach it). Uses the DDL-privileged migrations user.
            podman run --rm \
              -e DATABASE_URL="${{ secrets.DATABASE_URL_MIGRATIONS }}" \
              ghcr.io/${{ env.IMAGE_NAME }}:latest \
              npx knex migrate:latest --knexfile knexfile.cjs

            # One-time rename migrations: retire previous container/unit names.
            for old in gymdesk-backend gymdesk-api; do
              systemctl --user disable --now "$old.service" 2>/dev/null || true
              rm -f "$HOME/.config/systemd/user/$old.service"
              podman rm -f "$old" 2>/dev/null || true
            done

            systemctl --user stop fitness-api.service 2>/dev/null || true
            podman stop fitness-api || true
            podman rm fitness-api || true

            podman run -d \
              --name fitness-api \
              --restart unless-stopped \
              -p 3000:3000 \
              -e NODE_ENV=production \
              -e PORT=3000 \
              -e CORDEL_FITNESS_DB_HOST="${{ secrets.CORDEL_FITNESS_DB_HOST }}" \
              -e CORDEL_FITNESS_DB_USER="${{ secrets.CORDEL_FITNESS_DB_USER }}" \
              -e CORDEL_FITNESS_DB_PASSWORD="${{ secrets.CORDEL_FITNESS_DB_PASSWORD }}" \
              -e CORDEL_FITNESS_DB_NAME="${{ secrets.CORDEL_FITNESS_DB_NAME }}" \
              -e CLERK_SECRET_KEY="${{ secrets.CLERK_SECRET_KEY }}" \
              -e CLERK_PUBLISHABLE_KEY="${{ secrets.CLERK_PUBLISHABLE_KEY }}" \
              -e CORDEL_FITNESS_MEMBERS_URL="${{ vars.CORDEL_FITNESS_MEMBERS_URL }}" \
              ghcr.io/${{ env.IMAGE_NAME }}:latest

            # Verify the container actually started
            sleep 3
            podman inspect fitness-api --format='{{.State.Status}}' | grep -q running || \
              { echo "ERROR: Container failed to start"; podman logs fitness-api; exit 1; }

            # Verify the app responds from inside the server
            curl -sf --max-time 5 http://localhost:3000/health || \
              { echo "ERROR: /health not responding"; podman logs fitness-api; exit 1; }
            echo "Health check OK"

            # Rootless podman's --restart policy does not survive host reboots.
            # Install an enabled systemd user unit so the container starts on boot.
            mkdir -p ~/.config/systemd/user
            podman generate systemd --new --name fitness-api --restart-policy=always \
              > ~/.config/systemd/user/fitness-api.service
            systemctl --user daemon-reload
            systemctl --user enable fitness-api.service
            echo "Boot persistence unit installed"
