name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/fitness-api

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-24.04-arm
    environment: dev
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: api/Dockerfile
          push: true
          platforms: linux/arm64
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          no-cache: true

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CORBACK_SSH_HOST }}
          username: podman
          key: ${{ secrets.CORBACK_SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            echo "${{ secrets.GHCR_PAT }}" | podman login ghcr.io -u ${{ github.repository_owner }} --password-stdin

            # Check disk space before pulling (fail if less than 1GB free)
            AVAILABLE=$(df / --output=avail | tail -1)
            if [ "$AVAILABLE" -lt 1048576 ]; then
              echo "ERROR: Less than 1GB free on disk (${AVAILABLE}KB available). Aborting deploy."
              exit 1
            fi

            podman pull ghcr.io/${{ env.IMAGE_NAME }}:latest

            # Run DB migrations from the VPS (HeatWave is VCN-private; the CI
            # runner cannot reach it). Uses the DDL-privileged migrations user.
            podman run --rm \
              -e DATABASE_URL="${{ secrets.DATABASE_URL_MIGRATIONS }}" \
              ghcr.io/${{ env.IMAGE_NAME }}:latest \
              npx knex migrate:latest --knexfile knexfile.cjs

            # Oscar owns the systemd unit (ports, env vars, restart policy);
            # we just refresh the image and restart it.
            if ! systemctl --user restart fitness-api.service; then
              echo "ERROR: systemctl restart failed"
              systemctl --user status fitness-api.service --no-pager --lines=40 || true
              journalctl --user -xeu fitness-api.service --no-pager -n 60 || true
              podman ps -a --filter name=fitness-api || true
              exit 1
            fi

            sleep 3
            curl -sf --max-time 5 http://localhost:3000/health || \
              { echo "ERROR: /health not responding"; systemctl --user status fitness-api.service --no-pager || true; podman logs fitness-api 2>/dev/null || true; exit 1; }
            echo "Health check OK"
