name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/gymdesk-backend

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: backend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          no-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        run: npm ci --workspace=backend

      - name: Run database migrations
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx node-pg-migrate up --migrations-dir src/infra/migrations --no-lock

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CORBACK_SSH_HOST }}
          username: github
          key: ${{ secrets.CORBACK_SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            echo "${{ secrets.GHCR_PAT }}" | podman login ghcr.io -u ${{ github.repository_owner }} --password-stdin

            # Check disk space before pulling (fail if less than 1GB free)
            AVAILABLE=$(df / --output=avail | tail -1)
            if [ "$AVAILABLE" -lt 1048576 ]; then
              echo "ERROR: Less than 1GB free on disk (${AVAILABLE}KB available). Aborting deploy."
              exit 1
            fi

            # Keep rootless containers running after this SSH session ends
            loginctl enable-linger github || true

            podman image prune -af
            podman pull ghcr.io/${{ env.IMAGE_NAME }}:latest

            podman stop gymdesk-backend || true
            podman rm gymdesk-backend || true

            podman run -d \
              --name gymdesk-backend \
              --restart unless-stopped \
              -p 3000:3000 \
              -e NODE_ENV=production \
              -e PORT=3000 \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e CLERK_SECRET_KEY="${{ secrets.CLERK_SECRET_KEY }}" \
              -e CLERK_PUBLISHABLE_KEY="${{ secrets.CLERK_PUBLISHABLE_KEY }}" \
              -e MEMBER_APP_URL="${{ vars.MEMBER_APP_URL }}" \
              ghcr.io/${{ env.IMAGE_NAME }}:latest

            # Verify the container actually started
            sleep 3
            podman inspect gymdesk-backend --format='{{.State.Status}}' | grep -q running || \
              { echo "ERROR: Container failed to start"; podman logs gymdesk-backend; exit 1; }

            # Verify the app responds from inside the server
            curl -sf --max-time 5 http://localhost:3000/health || \
              { echo "ERROR: /health not responding"; podman logs gymdesk-backend; exit 1; }
            echo "Health check OK"
