name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'apps/backoffice/backend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/gymdesk-backend

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/backoffice/backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          no-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        run: npm ci --workspace=apps/backoffice/backend

      - name: Run database migrations
        working-directory: apps/backoffice/backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx node-pg-migrate up --migrations-dir src/infra/migrations --no-lock

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script: |
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

            docker image prune -af
            docker pull ghcr.io/${{ env.IMAGE_NAME }}:latest

            docker stop gymdesk-backend || true
            docker rm gymdesk-backend || true

            docker run -d \
              --name gymdesk-backend \
              --restart unless-stopped \
              -p 3001:3001 \
              -e NODE_ENV=production \
              -e PORT=3001 \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e CLERK_SECRET_KEY="${{ secrets.CLERK_SECRET_KEY }}" \
              -e CLERK_PUBLISHABLE_KEY="${{ secrets.CLERK_PUBLISHABLE_KEY }}" \
              -e FRONTEND_URL="http://localhost:3000,https://gymdesk-frontend.vercel.app" \
              ghcr.io/${{ env.IMAGE_NAME }}:latest
