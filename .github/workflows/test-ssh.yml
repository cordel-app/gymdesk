name: Test SSH corfront + corback

on:
  workflow_dispatch:

jobs:
  test-ssh-corfront:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH (corfront)
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.CORFRONT_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.CORFRONT_SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Check SSH key
        run: |
          ssh-keygen -lf ~/.ssh/id_ed25519

      - name: Test corfront connection
        run: |
          ssh \
          -i ~/.ssh/id_ed25519 \
          -o IdentitiesOnly=yes \
          -o PreferredAuthentications=publickey \
          podman@${{ secrets.CORFRONT_SSH_HOST }} \
          "hostname && echo \"arch: \$(uname -m)\" && \
           echo '--- identity ---' && whoami && id && echo \"HOME=\$HOME  XDG_RUNTIME_DIR=\$XDG_RUNTIME_DIR\" && \
           echo '--- listeners on 3000/8081/8082 ---' && (ss -tln | grep -E ':(3000|8081|8082) ' || echo '(none)') && \
           echo '--- podman ps -a as user podman ---' && podman ps -a --format 'table {{.Names}} {{.Ports}} {{.Status}}' && \
           echo '--- linger status for all users ---' && (ls /var/lib/systemd/linger/ 2>&1 || true) && \
           echo '--- pid 1 of process on 8081/8082 (best effort) ---' && (ss -tlnp 2>/dev/null | grep -E ':(8081|8082) ' || echo '(no -p access without root; expected as non-root)') && \
           echo ' - ✅ CORFRONT SSH OK'"

  test-ssh-corback:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH (corback)
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.CORBACK_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.CORBACK_SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Check SSH key
        run: |
          ssh-keygen -lf ~/.ssh/id_ed25519

      - name: Test corback connection
        run: |
          ssh \
          -i ~/.ssh/id_ed25519 \
          -o IdentitiesOnly=yes \
          -o PreferredAuthentications=publickey \
          -v \
          podman@${{ secrets.CORBACK_SSH_HOST }} \
          "hostname && echo \"arch: \$(uname -m)\" && echo ' - 🚀 CORBACK SSH OK'"
