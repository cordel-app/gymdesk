name: Test SSH corfront + corback

on:
  workflow_dispatch:

jobs:
  test-ssh-corfront:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH (corfront)
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.CORFRONT_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.CORFRONT_SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Check SSH key
        run: |
          ssh-keygen -lf ~/.ssh/id_ed25519

      - name: Test corfront connection
        run: |
          ssh \
          -i ~/.ssh/id_ed25519 \
          -o IdentitiesOnly=yes \
          -o PreferredAuthentications=publickey \
          -v \
          podman@${{ secrets.CORFRONT_SSH_HOST }} \
          "hostname && echo ' - ✅ CORFRONT SSH OK'"

  test-ssh-corback:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH (corback)
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.CORBACK_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.CORBACK_SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Check SSH key
        run: |
          ssh-keygen -lf ~/.ssh/id_ed25519

      - name: Test corback connection
        run: |
          ssh \
          -i ~/.ssh/id_ed25519 \
          -o IdentitiesOnly=yes \
          -o PreferredAuthentications=publickey \
          -v \
          podman@${{ secrets.CORBACK_SSH_HOST }} \
          "hostname && echo ' - 🚀 CORBACK SSH OK'"
