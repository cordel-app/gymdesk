name: Deploy Member

on:
  push:
    branches: [main]
    paths:
      - 'apps/member/**'
      - '.github/workflows/deploy-member.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/fitness-members

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-24.04-arm
    environment: dev
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/member/Dockerfile
          push: true
          platforms: linux/arm64
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          no-cache: true
          build-args: |
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}

      - name: Deploy to corfront
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CORFRONT_SSH_HOST }}
          username: podman
          key: ${{ secrets.CORFRONT_SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            echo "${{ secrets.GHCR_PAT }}" | podman login ghcr.io -u ${{ github.repository_owner }} --password-stdin

            AVAILABLE=$(df / --output=avail | tail -1)
            if [ "$AVAILABLE" -lt 1048576 ]; then
              echo "ERROR: Less than 1GB free on disk (${AVAILABLE}KB available). Aborting deploy."
              exit 1
            fi

            podman pull ghcr.io/${{ env.IMAGE_NAME }}:latest

            # Oscar owns the systemd unit (ports, env vars, restart policy);
            # we just refresh the image and restart it.
            if ! systemctl --user restart fitness-members.service; then
              echo "ERROR: systemctl restart failed"
              systemctl --user status fitness-members.service --no-pager --lines=40 || true
              journalctl --user -xeu fitness-members.service --no-pager -n 60 || true
              podman ps -a --filter name=fitness-members || true
              echo "--- image inspection ---"
              podman image inspect ghcr.io/${{ env.IMAGE_NAME }}:latest --format '{{.Architecture}} / {{.Os}} / cmd={{.Config.Cmd}} / entrypoint={{.Config.Entrypoint}}' || true
              echo "--- direct run: node --version + server.js exists ---"
              podman run --rm --entrypoint /bin/sh ghcr.io/${{ env.IMAGE_NAME }}:latest -c 'node --version && ls -la /app/apps/member/server.js 2>&1' 2>&1 || echo "(entrypoint probe failed)"
              echo "--- direct run: actual CMD to stderr ---"
              timeout 5 podman run --rm ghcr.io/${{ env.IMAGE_NAME }}:latest 2>&1 | head -20 || true
              exit 1
            fi

            sleep 3
            curl -sf --max-time 10 -o /dev/null http://localhost:8082/en || \
              { echo "ERROR: app not responding"; systemctl --user status fitness-members.service --no-pager || true; podman logs fitness-members 2>/dev/null || true; exit 1; }
            echo "Health check OK"
