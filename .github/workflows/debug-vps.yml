name: Debug VPS

on:
  workflow_dispatch:

jobs:
  debug:
    name: Inspect corback state
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Inspect VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CORBACK_SSH_HOST }}
          username: github
          key: ${{ secrets.CORBACK_SSH_PRIVATE_KEY }}
          script: |
            echo "=== whoami / id ==="
            whoami; id
            echo "=== uptime / last boot ==="
            uptime; uptime -s 2>&1 || who -b
            echo "=== linger status ==="
            loginctl show-user github --property=Linger 2>&1 || echo "linger query failed"
            ls /var/lib/systemd/linger/ 2>&1 || true
            echo "=== podman containers ==="
            podman ps -a 2>&1
            echo "=== listeners on 3000-3002 ==="
            (ss -tln | grep -E ':300[0-2]') || echo "nothing listening on 3000-3002"
            echo "=== localhost health ==="
            curl -s --max-time 5 http://localhost:3000/health || echo "localhost health FAILED"
            echo "=== podman logs (last 200) ==="
            podman logs --tail 200 gymdesk-backend 2>&1 || echo "no container logs"
            echo "=== container exit state ==="
            podman inspect gymdesk-backend --format '{{json .State}}' 2>&1 || echo "no container"
            echo "=== restart container if exited ==="
            if [ "$(podman inspect gymdesk-backend --format '{{.State.Status}}' 2>/dev/null)" != "running" ]; then
              podman start gymdesk-backend && echo "container started"
              sleep 3
              curl -s --max-time 5 http://localhost:3000/health || echo "health after restart FAILED"
            else
              echo "already running"
            fi
            echo "=== server public IP (egress) ==="
            curl -s --max-time 5 ifconfig.me || echo "could not determine"
            echo ""

      - name: Test HeatWave MySQL from VPS (both users)
        if: always()
        uses: appleboy/ssh-action@v1
        env:
          URL_MIG: ${{ secrets.DATABASE_URL_MIGRATIONS }}
          URL_APP: ${{ secrets.DATABASE_URL_MYSQL }}
        with:
          host: ${{ secrets.CORBACK_SSH_HOST }}
          username: github
          key: ${{ secrets.CORBACK_SSH_PRIVATE_KEY }}
          envs: URL_MIG,URL_APP
          script: |
            parse() { echo "$1" | sed -E "s|mysql://([^:]+):([^@]+)@([^:/]+):([0-9]+)/(.*)|\\$2|"; }
            for role in MIG APP; do
              eval "URL=\$URL_$role"
              U=$(echo "$URL" | sed -E 's|mysql://([^:]+):.*|\1|')
              P=$(echo "$URL" | sed -E 's|mysql://[^:]+:([^@]+)@.*|\1|')
              H=$(echo "$URL" | sed -E 's|.*@([^:/]+):.*|\1|')
              DB=$(echo "$URL" | sed -E 's|.*/([^/?]+)$|\1|')
              echo "=== $role: tcp $H:3306 ==="
              timeout 5 bash -c "</dev/tcp/$H/3306" && echo "tcp OK" || echo "tcp FAILED"
              echo "=== $role: auth + grants (user $U) ==="
              podman run --rm docker.io/library/mysql:8.4 mysql -h "$H" -u "$U" -p"$P" -e "SELECT 1 AS ok; SHOW GRANTS;" 2>&1 | grep -v Warning
              echo "=== $role: schema $DB visible ==="
              podman run --rm docker.io/library/mysql:8.4 mysql -h "$H" -u "$U" -p"$P" -e "SHOW DATABASES LIKE '$DB';" 2>&1 | grep -v Warning
            done
            echo "=== DDL smoke as deploy user (create/drop scratch table) ==="
            U=$(echo "$URL_MIG" | sed -E 's|mysql://([^:]+):.*|\1|')
            P=$(echo "$URL_MIG" | sed -E 's|mysql://[^:]+:([^@]+)@.*|\1|')
            H=$(echo "$URL_MIG" | sed -E 's|.*@([^:/]+):.*|\1|')
            DB=$(echo "$URL_MIG" | sed -E 's|.*/([^/?]+)$|\1|')
            podman run --rm docker.io/library/mysql:8.4 mysql -h "$H" -u "$U" -p"$P" "$DB" \
              -e "CREATE TABLE _m1_smoke (id INT); DROP TABLE _m1_smoke; SELECT 'ddl OK' AS result;" 2>&1 | grep -v Warning
            echo "=== DDL as app user must FAIL (least privilege) ==="
            U=$(echo "$URL_APP" | sed -E 's|mysql://([^:]+):.*|\1|')
            P=$(echo "$URL_APP" | sed -E 's|mysql://[^:]+:([^@]+)@.*|\1|')
            DB=$(echo "$URL_APP" | sed -E 's|.*/([^/?]+)$|\1|')
            podman run --rm docker.io/library/mysql:8.4 mysql -h "$H" -u "$U" -p"$P" "$DB" \
              -e "CREATE TABLE _m1_smoke2 (id INT);" 2>&1 | grep -v Warning || echo "(correctly denied)"

      - name: Test ports from runner
        if: always()
        run: |
          echo "--- health via CORBACK_SSH_HOST secret ---"
          curl -s --max-time 8 -o /dev/null -w "HTTP %{http_code}\n" http://${{ secrets.CORBACK_SSH_HOST }}:3000/health || echo "curl exit: $?"
          echo "--- health via 150.230.157.145 ---"
          curl -s --max-time 8 -o /dev/null -w "HTTP %{http_code}\n" http://150.230.157.145:3000/health || echo "curl exit: $?"
