name: Debug VPS

on:
  workflow_dispatch:

jobs:
  debug:
    name: Inspect corback state
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Inspect VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CORBACK_SSH_HOST }}
          username: github
          key: ${{ secrets.CORBACK_SSH_PRIVATE_KEY }}
          script: |
            echo "=== whoami / id ==="
            whoami; id
            echo "=== linger status ==="
            loginctl show-user github --property=Linger 2>&1 || echo "linger query failed"
            ls /var/lib/systemd/linger/ 2>&1 || true
            echo "=== podman containers ==="
            podman ps -a 2>&1
            echo "=== listeners on 3000-3002 ==="
            (ss -tln | grep -E ':300[0-2]') || echo "nothing listening on 3000-3002"
            echo "=== localhost health ==="
            curl -s --max-time 5 http://localhost:3000/health || echo "localhost health FAILED"
            echo "=== podman logs (last 20) ==="
            podman logs --tail 20 gymdesk-backend 2>&1 || echo "no container logs"
            echo "=== server public IP (egress) ==="
            curl -s --max-time 5 ifconfig.me || echo "could not determine"
            echo ""

      - name: Test ports from runner
        if: always()
        run: |
          echo "--- health via CORBACK_SSH_HOST secret ---"
          curl -s --max-time 8 -o /dev/null -w "HTTP %{http_code}\n" http://${{ secrets.CORBACK_SSH_HOST }}:3000/health || echo "curl exit: $?"
          echo "--- health via 150.230.157.145 ---"
          curl -s --max-time 8 -o /dev/null -w "HTTP %{http_code}\n" http://150.230.157.145:3000/health || echo "curl exit: $?"
