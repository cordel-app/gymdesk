name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: API
    runs-on: ubuntu-latest
    environment: dev
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: ci
          MYSQL_DATABASE: fitness
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -pci"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      # Migrations run against a throwaway MySQL service container — the real
      # HeatWave DB is VCN-private and unreachable from CI runners.
      DATABASE_URL: mysql://root:ci@127.0.0.1:3306/fitness
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
      PORT: 3000

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        working-directory: api
        run: npx tsc --noEmit

      - name: Run migrations
        working-directory: api
        run: npm run db:migrate

  admin:
    name: Admin
    runs-on: ubuntu-latest
    environment: dev
    env:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      NEXT_PUBLIC_BACKEND_URL: http://localhost:3000
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: /en/sign-in
      NEXT_PUBLIC_CLERK_SIGN_UP_URL: /en/sign-up
      NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: /en
      NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL: /en

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        working-directory: apps/admin
        run: npx tsc --noEmit

      - name: Build
        working-directory: apps/admin
        run: npm run build
